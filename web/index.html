<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Boy</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body {
          font-family: sans-serif;
        }
        .gameboy {
          width: fit-content;
          margin: auto;
          background-color: lightgray;
          padding: 36px;
          border-radius: 36px 36px 128px 36px;
          color: darkblue;
        }
        .bezel {
          background-color: grey;
          border-radius: 16px 16px 64px 16px;
          padding: 32px 96px;
          max-width: fit-content;
          margin: auto;
        }
        #rom-drop-zone {
          background-color: white;
          display: flex;
          width: 480px;
          height: 432px;
          align-items: center;
          justify-content: center;
        }
        #game-pak-input {
          display: none;
        }

        /* --- Knapper --- */
        .controls-upper-row {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-top: 96px;
          padding: 0 24px;
        }
        .controls-lower-row {
          display: flex;
          margin-top: 24px;
          justify-content: center;
        }

        /* D-pad */
        .dpad {
          display: grid;
          grid-template: 48px 48px 48px / 48px 48px 48px;
          gap: 0;
        }
        .dpad button {
          background: #222;
          color: white;
          border: 2px solid #444;
          border-radius: 4px;
          font-size: 18px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0;
          -webkit-user-select: none;
          user-select: none;
        }
        .dpad button:active { background: #555; }
        .dpad-up    { grid-area: 1 / 2; }
        .dpad-left  { grid-area: 2 / 1; }
        .dpad-center { grid-area: 2 / 2; background: #222 !important; border: 2px solid #444; border-radius: 4px; }
        .dpad-right { grid-area: 2 / 3; }
        .dpad-down  { grid-area: 3 / 2; }

        /* Start / Select */
        .meta-buttons {
          display: flex;
          gap: 16px;
          align-self: flex-end;
          margin-bottom: 4px;
        }
        .meta-buttons button {
          background: #555;
          color: white;
          border: none;
          border-radius: 12px;
          padding: 12px 36px;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 1px;
          cursor: pointer;
          -webkit-user-select: none;
          user-select: none;
        }
        .meta-buttons .button-with-text-below {
          transform: rotate(-25deg);

        }
        .meta-buttons button:active { background: #777; }

        /* A / B */
        .ab-buttons {
          display: flex;
          gap: 48px;
          align-items: center;
          transform: rotate(-25deg);
        }
        .ab-buttons button {
          width: 64px;
          height: 64px;
          border-radius: 50%;
          background: #8b1a4a;
          color: white;
          border: 2px solid #6b1030;
          font-size: 16px;
          font-weight: bold;
          cursor: pointer;
          -webkit-user-select: none;
          user-select: none;
        }
        .ab-buttons button:active { background: #a52a5a; }
        .button-with-text-below {
          display: flex;
          row-gap: 8px;
          flex-direction: column;
          text-align: center;
          font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="gameboy">
        <button id="menu-button" popovertarget="game-menu" popovertargetaction="toggle" aria-label="Meny">&#9776;</button>
        <div popover id="game-menu">
            <button class="menu-item" id="eject-button">Løs ut kassett</button>
        </div>
        <div class="bezel">
            <div id="screen"></div>
            <label id="rom-drop-zone">
                Last opp Game Boy-spillet ditt her
                <input type="file" id="game-pak-input" accept=".gb" />
            </label>
        </div>
        <div class="controls-upper-row">
            <div class="dpad">
                <button class="dpad-up" data-key="ArrowUp" aria-label="Opp">&#9650;</button>
                <button class="dpad-left" data-key="ArrowLeft" aria-label="Venstre">&#9664;</button>
                <div class="dpad-center"></div>
                <button class="dpad-right" data-key="ArrowRight" aria-label="Høyre">&#9654;</button>
                <button class="dpad-down" data-key="ArrowDown" aria-label="Ned">&#9660;</button>
            </div>
            <div class="ab-buttons">
                <label class="button-with-text-below">
                    <button data-key="x" aria-label="B"></button>
                    B
                </label>
                <label class="button-with-text-below">
                    <button data-key="z" aria-label="A"></button>
                    A
                </label>
            </div>
        </div>
        <div class="controls-lower-row">
            <div class="meta-buttons">
                <label class="button-with-text-below">
                    <button data-key="Backspace" aria-label="Select"></button>
                    SELECT
                </label>
                <label class="button-with-text-below">
                    <button data-key="Enter" aria-label="Start"></button>
                    START
                </label>
            </div>
        </div>
    </div>
</body>
<script type="module" src="main.js"></script>
</html>
