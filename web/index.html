<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Boy</title>
    <style>
        .bezel {
          background-color: grey;
          border-radius: 16px 16px 64px 16px;
          padding: 32px 96px;
          max-width: fit-content;
          margin: auto;
        }
    </style>
</head>
<body>
    <div class="bezel">
        <div id="screen"></div>
    </div>
</body>
<script type="module">
    import init, { main } from "./pkg/gameboy_web.js";

    await init();
    main();

    // Videresend tastatur-events til canvas slik at winit
    // fanger dem opp uansett hvilket element som har fokus.
    for (const type of ["keydown", "keyup"]) {
        document.addEventListener(type, (e) => {
            const canvas = document.querySelector("#screen canvas");
            if (canvas && e.target !== canvas) {
                canvas.dispatchEvent(new KeyboardEvent(type, e));
            }
        });
    }
</script>
</html>
