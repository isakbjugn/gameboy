<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Boy</title>
    <style>
         body {
           font-family: sans-serif;
         }
        .bezel {
          background-color: grey;
          border-radius: 16px 16px 64px 16px;
          padding: 32px 96px;
          max-width: fit-content;
          margin: auto;
        }
        #rom-drop-zone {
          background-color: white;
          display: flex;
          width: 480px;
          height: 432px;
          align-items: center;
          justify-content: center;
        }
        #game-pak-input {
          display: none;
        }
    </style>
</head>
<body>
    <div class="bezel">
        <div id="screen"></div>
        <label id="rom-drop-zone">
            Last opp Game Boy-spillet ditt her
            <input type="file" id="game-pak-input" accept=".gb" />
        </label>
    </div>
</body>
<script type="module" src="main.js"></script>
</html>
