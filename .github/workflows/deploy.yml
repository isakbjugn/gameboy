name: Publiser til GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.14.0-${{ runner.os }}

      - name: Installer wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.14.0

      - name: Cache Cargo-bygg
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-wasm-${{ hashFiles('Cargo.lock', 'core/src/**', 'web/src/**') }}
          restore-keys: cargo-wasm-

      - name: Bygg WebAssembly-bibliotek
        run: wasm-pack build web --release --target web --out-dir ../dist/pkg

      - name: Kopier fra web til dist
        run: cp web/index.html web/main.js web/menu.css web/buttons.css dist/

      - name: Last opp til GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
